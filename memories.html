<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Memories 💜</title>

<style>
body{
    margin:0;
    font-family:Poppins,sans-serif;
    background:#e6e6fa;
    text-align:center;
    overflow-x:hidden;
    opacity:0;
    transition:opacity 1s ease;
}
body.loaded{opacity:1;}

h1{margin-top:40px;}

.gallery img{
    width:250px;
    margin:20px;
    border-radius:20px;
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.next{
    margin:40px;
    padding:10px 30px;
    background:#b57edc;
    border:none;
    border-radius:20px;
    color:white;
    cursor:pointer;
}

/* Blinking Hearts */
.heart{
    position:fixed;
    top:10%;
    font-size:24px;
    animation:blink 1.2s infinite;
}
.heart:nth-of-type(1){left:10%;}
.heart:nth-of-type(2){left:80%;}
.heart:nth-of-type(3){left:50%;}

@keyframes blink{
    0%,100%{opacity:1;}
    50%{opacity:0.2;}
}

/* Lavender Petals */
.petal{
    position:fixed;
    top:-10px;
    font-size:20px;
    animation:fall linear infinite;
}
@keyframes fall{
    to{transform:translateY(100vh);}
}
</style>
</head>

<body>

<h1>Our Beautiful Memories 💜</h1>

<div class="gallery">
<img src="./photo1.jpg">
<img src="./photo2.jpg">
<img src="./photo3.jpg">
</div>

<button class="next" onclick="go()">Next</button>

<div class="heart">💜</div>
<div class="heart">💜</div>
<div class="heart">💜</div>

<audio id="music" loop>
<source src="./song.mp3" type="audio/mpeg">
</audio>

<script>
document.addEventListener("DOMContentLoaded",()=>{
    document.body.classList.add("loaded");

    if(localStorage.getItem("music")==="on"){
        document.getElementById("music").play();
    }

    for(let i=0;i<20;i++){
        let petal=document.createElement("div");
        petal.className="petal";
        petal.innerHTML="🌸";
        petal.style.left=Math.random()*100+"%";
        petal.style.animationDuration=(5+Math.random()*5)+"s";
        document.body.appendChild(petal);
    }
});

function go(){
    document.body.style.opacity="0";
    setTimeout(()=>{
        window.location="./letter.html";
    },800);
}
</script>

</body>
</html>
